<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合盛跟单中心</title>
<style>
:root {
  --bg: #0D0D0D;
  --surface-1: #111111;
  --surface-2: #161616;
  --surface-3: #1C1C1C;
  --surface-4: #222222;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.1);
  --text-primary: #FFFFFF;
  --text-secondary: #8A8A8A;
  --text-tertiary: #525252;
  --accent: #5E6AD2;
  --green: #2DA94E;
  --green-bg: rgba(45,169,78,0.1);
  --red: #F23D3D;
  --red-bg: rgba(242,61,61,0.1);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.1);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: 'Inter','-apple-system','system-ui',sans-serif;
  --transition: 150ms ease;
}
* {margin:0;padding:0;box-sizing:border-box}
html,body {height:100%;overflow:hidden}
body {font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text-primary);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* Layout */
.app {display:flex;height:100vh;overflow:hidden}
.sidebar {width:220px;background:var(--surface-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top {padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.sidebar-brand {font-size:14px;font-weight:600;letter-spacing:-0.01em}
.sidebar-sub {font-size:12px;color:var(--text-tertiary);margin-top:2px}
.nav-section {padding:8px 8px 4px}
.nav-label {font-size:11px;font-weight:500;color:var(--text-tertiary);padding:4px 6px 6px;letter-spacing:0.04em;text-transform:uppercase}
.nav-item {display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all var(--transition);margin-bottom:1px}
.nav-item:hover {background:var(--surface-2);color:var(--text-primary)}
.nav-item.active {background:var(--surface-3);color:var(--text-primary)}
.nav-icon {width:16px;height:16px;opacity:0.7;flex-shrink:0}
.nav-item.active .nav-icon {opacity:1}
.nav-badge {margin-left:auto;background:var(--surface-4);color:var(--text-tertiary);font-size:11px;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center}
.nav-badge.red {background:var(--red-bg);color:var(--red)}
.sidebar-bottom {margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.sidebar-user {display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm)}
.sidebar-avatar {width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
.sidebar-user-name {font-size:13px}

.main {flex:1;display:flex;flex-direction:column;min-width:0}

/* Topbar */
.topbar {height:48px;background:var(--surface-1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-title {font-size:14px;font-weight:600}
.topbar-right {display:flex;align-items:center;gap:12px}
.topbar-sync {font-size:12px;color:var(--text-tertiary)}
.topbar-time {font-size:20px;font-weight:400;color:var(--text-primary);letter-spacing:-0.02em}

/* Content */
.content {flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.content::-webkit-scrollbar {width:4px}
.content::-webkit-scrollbar-thumb {background:var(--surface-4);border-radius:2px}
.page {display:none;flex-direction:column;gap:16px}
.page.active {display:flex}

/* Stats */
.stats-grid {display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.stat-card {background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;cursor:pointer;transition:all var(--transition)}
.stat-card:hover {border-color:var(--border-hover)}
.stat-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stat-label {font-size:11px;color:var(--text-tertiary);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.stat-value {font-size:28px;font-weight:600;letter-spacing:-0.03em;line-height:1}
.stat-card.red .stat-value {color:var(--red)}
.stat-card.green .stat-value {color:var(--green)}

/* Panels */
.panels {display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1}
.panel {background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;display:flex;flex-direction:column;min-height:0}
.panel-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0}
.panel-title {font-size:13px;font-weight:600}
.panel-meta {font-size:12px;color:var(--text-tertiary)}
.panel-body {flex:1;overflow-y:auto;min-height:120px}
.panel-body::-webkit-scrollbar {width:3px}
.panel-body::-webkit-scrollbar-thumb {background:var(--surface-4);border-radius:2px}
.panel-full {grid-column:1/-1}

/* Emergency */
.emergency-item {display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);background:var(--surface-2);margin-bottom:4px;cursor:pointer;transition:background var(--transition)}
.emergency-item:hover {background:var(--surface-3)}
.emergency-dot {width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.emergency-info {flex:1;min-width:0}
.emergency-code {font-size:13px;font-weight:500;font-family:'SF Mono','Menlo',monospace}
.emergency-meta {font-size:11px;color:var(--text-tertiary);margin-top:1px}
.emergency-days {font-size:12px;font-weight:600;color:var(--red);white-space:nowrap}

/* Step progress */
.step-list {display:flex;flex-direction:column;gap:6px}
.step-row {display:flex;align-items:center;gap:10px}
.step-name {font-size:12px;color:var(--text-secondary);width:60px;flex-shrink:0}
.step-bar {flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.step-fill {height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.step-count {font-size:11px;color:var(--text-tertiary);width:30px;text-align:right;flex-shrink:0}

/* Kanban */
.kanban-filters {display:flex;gap:6px;margin-bottom:14px}
.kb-tab {padding:5px 12px;border-radius:20px;font-size:12px;color:var(--text-secondary);background:none;border:1px solid transparent;cursor:pointer;transition:all var(--transition)}
.kb-tab:hover {color:var(--text-primary);background:var(--surface-2)}
.kb-tab.active {background:var(--surface-3);border-color:var(--border);color:var(--text-primary)}
.kanban-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.kb-card {background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;cursor:pointer;transition:all var(--transition)}
.kb-card:hover {border-color:var(--border-hover);background:var(--surface-3)}
.kb-top {display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.kb-num {font-size:13px;font-weight:600;font-family:'SF Mono','Menlo',monospace}
.kb-status {font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px}
.kb-status.urgent {background:var(--red-bg);color:var(--red)}
.kb-status.producing {background:var(--amber-bg);color:var(--amber)}
.kb-status.done {background:var(--green-bg);color:var(--green)}
.kb-customer {font-size:12px;color:var(--text-secondary);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kb-meta {display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-tertiary)}
.kb-progress {flex:1;margin-right:10px}
.kb-date {white-space:nowrap}
.progress-bar {height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.progress-fill {height:100%;background:rgba(255,255,255,0.3);border-radius:2px;transition:width .3s}

/* Inventory */
.inv-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.inv-card {background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px}
.inv-top {display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inv-name {font-size:13px;font-weight:500}
.inv-stock {font-size:22px;font-weight:600;letter-spacing:-0.03em}
.inv-stock.ok {color:var(--green)}
.inv-stock.warn {color:var(--amber)}
.inv-stock.low {color:var(--red)}
.inv-num {font-size:11px;color:var(--text-tertiary);margin-top:2px}

/* Empty */
.empty {text-align:center;padding:24px 0;color:var(--text-tertiary);font-size:13px}

/* Modal */
.modal {display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.show {display:flex}
.modal-content {background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal-header {padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title {font-size:14px;font-weight:600}
.modal-close {width:28px;height:28px;border-radius:6px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover {background:var(--surface-3);color:var(--text-primary)}
.modal-body {padding:16px 20px}
.detail-row {display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child {border-bottom:none}
.detail-label {font-size:13px;color:var(--text-tertiary)}
.detail-value {font-size:13px;font-weight:500;text-align:right}

/* Responsive */
@media(max-width:1100px) {
  .stats-grid {grid-template-columns:repeat(3,1fr)}
  .panels {grid-template-columns:1fr}
  .sidebar {width:180px}
}
@media(max-width:700px) {
  .sidebar {display:none}
  .stats-grid {grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-value {font-size:24px}
  .content {padding:12px}
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->

<script>
var FS_PROD_TABLE = 'tblulFnP5TbawnY1';
var FS_INV_TABLE = 'tbljcHJOCAMHfPdx';
var orders = [];
var inventoryData = [];
var currentKanbanFilter = 'all';

async function loadOrders() {
  try {
    var r = await fetch('/api/prod_orders');
    var d = await r.json();
    if (d.data && d.data.items) {
      orders = d.data.items.map(function(item) {
        var f = item.fields;
        var orderNum = f['生产单'] || '';
        var linkOrder = f['关联订单'];
        var orderNumber = (linkOrder && linkOrder.text) ? linkOrder.text : orderNum;
        var currentStep = f['当前工序'] || '接单';
        var estDate = f['预计完成日期'];
        var estStr = estDate ? new Date(estDate).toISOString().split('T')[0] : '';
        var today = new Date().toISOString().split('T')[0];
        var daysLeft = estStr ? Math.ceil((new Date(estStr) - new Date(today)) / 86400000) : null;
        var isUrgent = daysLeft !== null && daysLeft <= 3 && daysLeft >= 0;
        var isCompleted = !!(f['完工入库']);
        var qty = parseInt(f['数量(G)']) || 0;
        var steps = getStepsForOrder({currentStep: currentStep});
        var stepIdx = steps.indexOf(currentStep);
        var progress = steps.length > 0 ? Math.round(((stepIdx + 1) / steps.length) * 100) : 0;
        var linkProducts = f['关联产品'];
        var productName = (linkProducts && linkProducts.text) ? linkProducts.text : (f['关联产品'] || '');
        return {
          id: item.record_id,
          orderNumber: orderNumber,
          productName: productName,
          currentStep: currentStep,
          estimatedDate: estStr,
          daysLeft: daysLeft,
          isUrgent: isUrgent,
          isCompleted: isCompleted,
          quantityG: qty,
          progress: progress,
          steps: steps
        };
      }).filter(Boolean);
      renderAll();
    }
  } catch(e) { console.error(e); }
  updateSyncTime();
}

function renderAll() {
  var urgent = orders.filter(function(o){ return o.isUrgent && !o.isCompleted });
  var producing = orders.filter(function(o){ return !o.isCompleted && o.currentStep !== '接单' });
  var done = orders.filter(function(o){ return o.isCompleted });
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statUrgent').textContent = urgent.length;
  document.getElementById('statProducing').textContent = producing.length;
  document.getElementById('statDone').textContent = done.length;
  document.getElementById('navTotal').textContent = orders.length;
  document.getElementById('navProducing').textContent = producing.length;
  document.getElementById('urgentBadge').textContent = urgent.length + '单';
  document.getElementById('kbAll').textContent = orders.length;
  document.getElementById('kbProd').textContent = producing.length;
  document.getElementById('kbDone').textContent = done.length;
  renderEmergency(urgent);
  renderStepProgress(producing);
  renderKanban('kanbanGrid');
  document.getElementById('kanbanCount').textContent = orders.length + '单';
}

function renderEmergency(urgent) {
  var container = document.getElementById('emergencyList');
  if (urgent.length === 0) { container.innerHTML = '<div class="empty">暂无紧急订单</div>'; return; }
  urgent.sort(function(a,b){ return (a.daysLeft||999) - (b.daysLeft||999); });
  var html = '';
  urgent.forEach(function(o) {
    var daysText = o.daysLeft === 0 ? '今天到期' : (o.daysLeft < 0 ? '已逾期' : '剩'+o.daysLeft+'天');
    html += '<div class="emergency-item" onclick="showDetail(\'' + escapeHtml(o.orderNumber) + '\')">';
    html += '<div class="emergency-dot"></div>';
    html += '<div class="emergency-info">';
    html += '<div class="emergency-code">' + escapeHtml(o.orderNumber) + '</div>';
    html += '<div class="emergency-meta">' + escapeHtml(o.productName) + ' · ' + escapeHtml(o.estimatedDate||'-') + '</div>';
    html += '</div>';
    html += '<div class="emergency-days">' + daysText + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderStepProgress(producing) {
  var allSteps = ['接单','调色','制胚','棍花/片桶','切胚','甩干','筛胚','初检','车钮','抛光','终检','包装','出货'];
  var counts = {}; allSteps.forEach(function(s){ counts[s] = 0; });
  producing.forEach(function(o){ var idx = allSteps.indexOf(o.currentStep); if(idx>=0) counts[allSteps[idx]]++; });
  var total = producing.length || 1;
  var active = allSteps.filter(function(s){ return counts[s] > 0; });
  document.getElementById('stepBadge').textContent = total + '单进行中';
  if (active.length === 0) { document.getElementById('stepBody').innerHTML = '<div class="empty">暂无进行中订单</div>'; return; }
  var html = '<div class="step-list">';
  active.forEach(function(s){ var pct = Math.round((counts[s]/total)*100); html += '<div class="step-row"><div class="step-name">'+s+'</div><div class="step-bar"><div class="step-fill" style="width:'+pct+'%"></div></div><div class="step-count">'+counts[s]+'</div></div>'; });
  html += '</div>';
  document.getElementById('stepBody').innerHTML = html;
}

function switchKanbanFilter(filter, el) {
  currentKanbanFilter = filter;
  if (el) { document.querySelectorAll('.kb-tab').forEach(function(t){ t.classList.remove('active'); }); el.classList.add('active'); }
  renderKanban('kanbanGrid');
  renderKanban('kanbanPageGrid', true);
}

function renderKanban(containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var filtered;
  if (currentKanbanFilter === 'producing') filtered = orders.filter(function(o){ return !o.isCompleted && o.currentStep !== '接单'; });
  else if (currentKanbanFilter === 'done') filtered = orders.filter(function(o){ return o.isCompleted; });
  else filtered = orders.filter(function(o){ return !o.isCompleted; });
  filtered.sort(function(a,b){ if(a.isUrgent&&!b.isUrgent) return -1; if(!a.isUrgent&&b.isUrgent) return 1; return (a.estimatedDate||'').localeCompare(b.estimatedDate||''); });
  if (filtered.length === 0) { container.innerHTML = '<div class="empty">' + (currentKanbanFilter==='done'?'暂无已完成订单':'暂无订单') + '</div>'; return; }
  var html = '';
  filtered.forEach(function(o) {
    var statusClass = o.isUrgent ? 'urgent' : (o.isCompleted ? 'done' : 'producing');
    var statusText = o.isCompleted ? '已完成' : o.currentStep;
    html += '<div class="kb-card" onclick="showDetail(\'' + escapeHtml(o.orderNumber) + '\')">';
    html += '<div class="kb-top"><div class="kb-num">' + escapeHtml(o.orderNumber) + '</div><div class="kb-status ' + statusClass + '">' + statusText + '</div></div>';
    html += '<div class="kb-customer">' + escapeHtml(o.productName) + '</div>';
    html += '<div class="kb-meta"><div class="kb-progress"><div class="progress-bar"><div class="progress-fill" style="width:' + o.progress + '%"></div></div></div><div class="kb-date">' + escapeHtml(o.estimatedDate||'-') + '</div></div>';
    html += '</div>';
  });
  container.innerHTML = html;
  if (containerId === 'kanbanPageGrid') document.getElementById('kbPageCount').textContent = filtered.length + '单';
}

function showDetail(orderNum) {
  var o = orders.find(function(x){ return x.orderNumber === orderNum; });
  if (!o) return;
  document.getElementById('modalTitle').textContent = escapeHtml(o.orderNumber);
  var body = '';
  body += '<div class="detail-row"><div class="detail-label">产品</div><div class="detail-value">' + escapeHtml(o.productName||'-') + '</div></div>';
  var urgentStyle = o.isUrgent ? ' style="color:var(--red)"' : '';
  body += '<div class="detail-row"><div class="detail-label">当前工序</div><div class="detail-value' + urgentStyle + '">' + escapeHtml(o.currentStep) + '</div></div>';
  body += '<div class="detail-row"><div class="detail-label">完成进度</div><div class="detail-value">' + o.progress + '%</div></div>';
  body += '<div class="detail-row"><div class="detail-label">交货日期</div><div class="detail-value' + urgentStyle + '">' + escapeHtml(o.estimatedDate||'-') + '</div></div>';
  body += '<div class="detail-row"><div class="detail-label">数量</div><div class="detail-value">' + o.quantityG + 'G</div></div>';
  var statusStyle = o.isCompleted ? ' style="color:var(--green)"' : urgentStyle;
  var statusText = o.isCompleted ? '已完成' : (o.isUrgent ? '紧急' : '生产中');
  body += '<div class="detail-row"><div class="detail-label">状态</div><div class="detail-value' + statusStyle + '">' + statusText + '</div></div>';
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('orderModal').classList.add('show');
}

function closeModal() {
  document.getElementById('orderModal').classList.remove('show');
}

// INVENTORY
async function loadInventory() {
  try {
    var r = await fetch('/api/inventory');
    var d = await r.json();
    if (d.data && d.data.items) {
      var latest = {};
      d.data.items.forEach(function(item) {
        var f = item.fields;
        var name = f['产品名称'] || '-';
        var num = f['产品编号'];
        if (num && Array.isArray(num)) num = num[0].text || '-';
        var stock = typeof f['当前库存'] === 'number' ? f['当前库存'] : 0;
        var warehouse = f['仓库'] || '-';
        var time = f['操作时间'] ? new Date(f['操作时间']).toLocaleString('zh-CN') : '-';
        var key = name + '_' + warehouse;
        if (!latest[key] || (time > latest[key].time)) latest[key] = {name:name, num:num, stock:stock, warehouse:warehouse, time:time};
      });
      inventoryData = Object.values(latest);
      document.getElementById('navInventory').textContent = inventoryData.length;
      document.getElementById('statInventory').textContent = inventoryData.length;
      renderInventory();
    }
  } catch(e) { console.error(e); }
}

function renderInventory() {
  var container = document.getElementById('invGrid');
  if (inventoryData.length === 0) { container.innerHTML = '<div class="empty">暂无库存数据</div>'; return; }
  var html = '';
  inventoryData.forEach(function(item) {
    var level = item.stock > 20 ? 'ok' : (item.stock > 5 ? 'warn' : 'low');
    html += '<div class="inv-card">';
    html += '<div class="inv-top"><div class="inv-name">' + escapeHtml(item.name) + '</div><div class="inv-stock ' + level + '">' + item.stock + '</div></div>';
    html += '<div class="inv-num">编号: ' + escapeHtml(item.num) + '</div>';
    html += '<div class="inv-num">仓库: ' + escapeHtml(item.warehouse) + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function switchPage(page, el) {
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  if (el) el.classList.add('active');
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  var titles = {dashboard:'仪表盘', kanban:'看板', inventory:'库存', settings:'设置'};
  document.getElementById('topbarTitle').textContent = titles[page] || page;
  document.getElementById(page + 'Page').classList.add('active');
  if (page === 'kanban') renderKanban('kanbanPageGrid');
  if (page === 'inventory') loadInventory();
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pad(n) { return n < 10 ? '0' + n : n; }

function updateTime() {
  var now = new Date();
  document.getElementById('headerTime').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('syncTime').textContent = '同步 ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
}
setInterval(updateTime, 1000);
updateTime();

loadOrders();
loadInventory();
setInterval(loadOrders, 30000);
</script>
