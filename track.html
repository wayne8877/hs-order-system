<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>订单进度 - 合盛钮扣厂</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:16px;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:40px 20px}
.main{padding:20px 0}
.countdown-card{background:#fff;border-radius:20px;padding:30px;text-align:center;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.countdown-days{font-size:72px;font-weight:700;color:#1d1d1f;line-height:1}
.countdown-unit{font-size:24px;color:#86868b;font-weight:400}
.countdown-label{font-size:18px;color:#86868b;margin-top:12px;font-weight:500}
.countdown-bar{height:10px;background:#f0f0f5;border-radius:5px;margin-top:20px;overflow:hidden}
.countdown-bar-fill{height:100%;background:#34c759;border-radius:3px;transition:width .5s}
.status-card{background:#fff;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.status-label{font-size:14px;color:#86868b;margin-bottom:6px}
.status-value{font-size:28px;font-weight:700;color:#1d1d1f}
.status-sub{font-size:14px;color:#86868b;margin-top:4px}
.info-card{background:#fff;border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.info-header{padding:18px 24px;background:#fafafa;border-bottom:1px solid #f0f0f5;font-size:16px;font-weight:600;color:#1d1d1f}
.info-row{display:flex;padding:16px 24px;border-bottom:1px solid #f5f5f7}
.info-row:last-child{border-bottom:none}
.info-label{flex:0 0 90px;font-size:15px;color:#86868b}
.info-value{flex:1;font-size:15px;font-weight:500;color:#1d1d1f}
.steps-card{background:#fff;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.steps-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.steps-title{font-size:16px;font-weight:600;color:#1d1d1f}
.steps-count{font-size:13px;color:#86868b}
.step{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid #f5f5f7}
.step:last-child{border-bottom:none}
.step-dot{width:34px;height:34px;border-radius:50%;background:#f0f0f5;color:#86868b;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-right:14px;flex-shrink:0}
.step.done .step-dot{background:#e8f5e9;color:#34c759}
.step.active .step-dot{background:#007aff;color:#fff}
.step.future .step-dot{opacity:0.3}
.step-name{font-size:15px;color:#86868b}
.step.done .step-name{color:#34c759}
.step.active .step-name{color:#007aff;font-weight:600}
.step-time{margin-left:auto;font-size:14px;color:#86868b}
.step.done .step-time{color:#86868b}
.step.active .step-time{color:#007aff}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:48px;color:rgba(0,0,0,0.04);font-weight:700;pointer-events:none;white-space:nowrap;z-index:0;user-select:none}
.footer{text-align:center;color:#86868b;font-size:13px;padding:24px}
</style>
</head>
<body>

<div class="wrap">
<div class="main">
<div id="content">
<div class="loading">正在加载...</div>
</div>

<div class="footer"><div style="margin-top:16px"><a href="tel:跟单员" style="display:inline-block;background:#007aff;color:#fff;padding:12px 24px;border-radius:12px;font-size:16px;text-decoration:none">有问题？联系跟单员</a></div></div>
<div class="watermark">www.buttonhs.com</div>
</div>
</div>

<script>
var STEPS=['接单','调色','制胚','切胚','甩干','筛胚','初检','车钮','抛光','终检','包装','出货'];

function getOrderId(){
  var path=window.location.pathname;
  return path.split('/').pop() || 'ORD20260407001';
}

function loadOrder(){
  fetch('/api/order/'+getOrderId())
    .then(function(r){return r.json()})
    .then(function(d){renderOrder(d.order || getMock())})
    .catch(function(){renderOrder(getMock())});
}

function getMock(){
  return {
    orderNumber:'ORD20260407001',
    customerName:'张三制衣厂',
    productName:'统一扣 25#',
    color:'黑色',
    quantity:'5000',
    unit:'G',
    deliveryDate:'2026-04-15',
    currentStep:'车钮',
    currentStepIdx:8,
    followerName:'刘小姐',
    followerPhone:'13800138000',
    stepTimes:{接单:'04-07 09:00',调色:'04-07 10:30',制胚:'04-07 11:00',切胚:'04-07 14:00',甩干:'04-07 15:30',筛胚:'04-07 16:00',初检:'04-07 16:30',车钮:null}
  };
}

function renderOrder(o){
  var idx=o.currentStepIdx>=0?o.currentStepIdx:STEPS.indexOf(o.currentStep);
  if(idx<0)idx=0;
  var pct=Math.round(idx/STEPS.length*100);
  var days=Math.ceil((new Date(o.deliveryDate)-new Date())/(1000*60*60*24));
  var t=o.stepTimes||{};
  
  var h='';
  h+='<div class="countdown-card">';
  h+='<div class="countdown-days">'+Math.abs(days)+'<span class="countdown-unit">天</span></div>';
  h+='<div class="countdown-label">距约定交货 '+o.deliveryDate+'</div>';
  h+='<div class="countdown-bar"><div class="countdown-bar-fill" style="width:'+pct+'%"></div></div>';
  h+='</div>';
  
  h+='<div class="status-card">';
  h+='<div class="status-label">当前工序</div>';
  h+='<div class="status-value">'+o.currentStep+'</div>';
  h+='<div class="status-sub">已完成 '+idx+' / '+STEPS.length+' 工序，进度 '+pct+'%</div>';
  h+='</div>';
  
  h+='<div class="info-card">';
  h+='<div class="info-header">订单信息</div>';
  h+='<div class="info-row"><span class="info-label">订单编号</span><span class="info-value">'+o.orderNumber+'</span></div>';
  h+='<div class="info-row"><span class="info-label">客户名称</span><span class="info-value">'+o.customerName+'</span></div>';
  h+='<div class="info-row"><span class="info-label">产品规格</span><span class="info-value">'+o.productName+'</span></div>';
  h+='<div class="info-row"><span class="info-label">颜色要求</span><span class="info-value">'+(o.color||'-')+'</span></div>';
  h+='<div class="info-row"><span class="info-label">订购数量</span><span class="info-value">'+o.quantity+' '+o.unit+'</span></div>';
  h+='</div>';
  
  h+='<div class="steps-card">';
  h+='<div class="steps-header">';
  h+='<div class="steps-title">生产进度</div>';
  h+='<div class="steps-count">'+idx+'/'+STEPS.length+' 工序完成</div>';
  h+='</div>';
  for(var i=0;i<STEPS.length;i++){
    var sn=STEPS[i];
    var st=t[sn];
    var cls='step';
    if(i<idx)cls+=' done';else if(i===idx)cls+=' active';else cls+=' future';
    h+='<div class="'+cls+'">';
    h+='<div class="step-dot">'+(i<idx?'V':(i+1))+'</div>';
    h+='<div class="step-name">'+sn+'</div>';
    h+='<div class="step-time">'+(st||(i===idx?'进行中':'-'))+'</div>';
    h+='</div>';
  }
  h+='</div>';
  
  document.getElementById('content').innerHTML=h;
}

loadOrder();
setInterval(loadOrder,30000);
</script>
</body>
</html>
