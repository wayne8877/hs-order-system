<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>跟单中心 - 合盛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#fafaf9;color:#1a1a1a;font-size:20px;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding-bottom:20px}
.header{padding:20px 16px;background:#fff;border-bottom:1px solid #eee}
.page-title{font-size:20px;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#e5e5e5;border-radius:12px;overflow:hidden;margin:16px}
.stat{background:#fff;padding:14px 8px;text-align:center}
.stat-value{font-size:28px;font-weight:700}
.stat-label{font-size:12px;color:#999;margin-top:4px}
.list{padding:0 16px}
.list-title{font-size:14px;color:#999;margin-bottom:10px;text-transform:uppercase}
.order-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.order-top{display:flex;justify-content:space-between;align-items:flex-start}
.order-num{font-size:16px;font-weight:600}
.order-customer{font-size:14px;color:#666;margin-top:2px}
.order-days{font-size:20px;font-weight:700}
.order-days.warning{color:#d97706}
.order-days.danger{color:#dc2626}
.order-info{font-size:14px;color:#999;margin-top:8px}
.detail-header{padding:16px;background:#fff;border-bottom:1px solid #eee}
.detail-back{font-size:15px;color:#666;margin-bottom:10px;cursor:pointer}
.detail-num{font-size:20px;font-weight:700}
.detail-info{font-size:14px;color:#666;margin-top:4px}
.step-list{padding:16px}
.step-item{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden}
.step-row{padding:12px 14px;display:flex;align-items:center;gap:10px}
.step-num{width:26px;height:26px;background:#f0f0f0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#999}
.step-item.done .step-num{background:#22c55e;color:#fff}
.step-item.active .step-num{background:#f59e0b;color:#fff}
.step-name{font-size:15px;color:#999}
.step-item.done .step-name{color:#22c55e}
.step-item.active .step-name{color:#1a1a1a;font-weight:600}
.step-status{margin-left:auto;font-size:12px;color:#999}
.step-item.done .step-status{color:#22c55e}
.step-item.active .step-status{color:#f59e0b}
.action-box{padding:14px 16px;background:#fff;border-radius:10px;margin:16px 0}
.remark-input{width:100%;padding:10px;border:1px solid #e5e5e5;border-radius:8px;font-size:15px;resize:none;box-sizing:border-box;margin-bottom:10px}
.confirm-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:500;cursor:pointer;display:block;text-align:center}
.confirm-btn:disabled{background:#ccc;cursor:not-allowed}
.share-box{margin:16px;padding:16px;background:#fff;border-radius:12px;text-align:center}
.share-title{font-size:16px;font-weight:600;margin-bottom:4px}
.share-desc{font-size:14px;color:#999;margin-bottom:12px}
.share-link{background:#f5f5f5;border-radius:8px;padding:12px;display:flex;align-items:center;gap:8px}
.share-url{flex:1;font-size:13px;word-break:break-all;color:#1a1a1a}
.copy-btn{background:#1a1a1a;color:#fff;border:none;padding:8px 12px;border-radius:6px;font-size:13px;cursor:pointer}
.copy-btn.copied{background:#22c55e}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty-icon{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:80px;color:#999}
.msg-box{text-align:center;padding:8px;background:#fff;border-radius:8px;margin:8px 16px;font-size:15px;color:#666}
.msg-box.success{background:#dcfce7;color:#166534}
.msg-box.error{background:#fee2e2;color:#991b1b}
.filter-btn{padding:6px 14px;border-radius:16px;background:#f0f0f0;font-size:12px;cursor:pointer;display:inline-block}
.filter-btn.active{background:#1a1a1a;color:#fff}
</style>
</head>
<body>
<div class="wrap">
<div id="app"><div class="loading">加载中...</div></div>
</div>
<script src="shared.js"></script>
<script>
var allOrders=[];
var stepCompletedTimes={};
var showOnlyActive=false;
var currentDetailIdx=0;

function setShowOnlyActive(v){
  showOnlyActive=v;
  renderList();
}

function renderList(){
  var urgentCount=allOrders.filter(function(o){return getDaysLeft(o.estimatedDate)<=1}).length;
  var warningCount=allOrders.filter(function(o){var d=getDaysLeft(o.estimatedDate);return d>1&&d<=3}).length;

  var h='<div class="header" style="display:flex;align-items:center;justify-content:space-between">';
  h+='<div class="page-title">跟单中心</div>';
  h+='<a href="/order-pro-a" style="background:#007aff;color:#fff;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none">+ 新增订单</a>';
  h+='<div style="font-size:16px;cursor:pointer;margin-left:12px" onclick="location.reload()">刷新</div>';
  h+='</div>';

  h+='<div class="stats">';
  h+='<div class="stat"><div class="stat-value">'+(urgentCount||0)+'</div><div class="stat-label">紧急</div></div>';
  h+='<div class="stat"><div class="stat-value">'+(warningCount||0)+'</div><div class="stat-label">即将到期</div></div>';
  h+='<div class="stat"><div class="stat-value">'+allOrders.length+'</div><div class="stat-label">全部</div></div>';
  h+='<div class="stat"><div class="stat-value">0</div><div class="stat-label">今日交货</div></div>';
  h+='</div>';

  h+='<div class="list"><div class="list-title">订单列表</div>';

  var filteredOrders=showOnlyActive?allOrders.filter(function(o){return !o.isCompleted&&!o.isPaused}):allOrders;

  if(filteredOrders.length===0){
    h+='<div class="empty"><div class="empty-icon">📋</div>暂无订单<br><br><a href="/order-pro-a" style="color:#007aff">点击录入新订单</a></div>';
  } else {
    filteredOrders.forEach(function(o,i){
      var days=getDaysLeft(o.estimatedDate);
      var daysClass=days<=0?'danger':(days<=3?'warning':'');
      h+='<div class="order-card" data-idx="'+i+'">';
      h+='<div class="order-top">';
      h+='<div><div class="order-num">'+escapeHtml(o.orderNumber)+'</div><div class="order-customer">'+escapeHtml(o.customerName||'客户')+'</div></div>';
      h+='<div class="order-days '+daysClass+'">'+days+'天</div>';
      h+='</div>';
      h+='<div class="order-info">'+(o.productName||'')+' | '+escapeHtml(o.currentStep)+'</div>';
      h+='</div>';
    });
  }

  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
}

function showDetail(idx){
  var o=allOrders[idx];
  if(!o) return;
  currentDetailIdx=idx;

  var steps=getStepsForOrder(o);
  var currentStepIdx=getStepIndex(o.currentStep, steps);
  if(currentStepIdx<0) currentStepIdx=0;

  var trackUrl='http://120.79.180.199:3000/track/'+o.orderNumber;

  var h='<div class="detail-header">';
  h+='<div class="detail-back" data-action="back">← 返回列表</div>';
  h+='<div class="detail-num">'+escapeHtml(o.orderNumber)+'</div>';
  h+='<div class="detail-info">'+escapeHtml(o.customerName||'客户')+' | '+escapeHtml(o.currentStep)+' | 剩余'+getDaysLeft(o.estimatedDate)+'天</div>';
  h+='</div>';

  h+='<div class="step-list"><div class="list-title">生产工序</div>';

  for(var i=0;i<steps.length;i++){
    var done=i<currentStepIdx;
    var active=i===currentStepIdx;
    var cls='step-item'+(done?' done':'')+(active?' active':'');
    h+='<div class="'+cls+'">';
    h+='<div class="step-row">';
    h+='<div class="step-num">'+(done?'✓':(i+1))+'</div>';
    h+='<div class="step-name">'+steps[i]+'</div>';
    var statusText=done?'已完成':(active?'进行中':'待完成');
    if(done && stepCompletedTimes[currentDetailIdx+'_'+i]){
      statusText+=' '+stepCompletedTimes[currentDetailIdx+'_'+i];
    }
    h+='<div class="step-status">'+statusText+'</div>';
    h+='</div>';

    if(active){
      h+='<div class="step-content" style="padding:0 14px 14px">';
      h+='<textarea class="remark-input" rows="2" placeholder="备注（可选）" id="remarkInput"></textarea>';
      h+='<button type="button" class="confirm-btn" id="confirmBtn" data-step="'+i+'">确认完成</button>';
      h+='<div id="msgBox" class="msg-box" style="display:none"></div>';
      h+='</div>';
    }
    h+='</div>';
  }

  h+='</div>';

  h+='<div class="share-box">';
  h+='<div class="share-title">分享给客户</div>';
  h+='<div class="share-desc">客户可实时查看订单进度</div>';
  h+='<div class="share-link">';
  h+='<div class="share-url">'+trackUrl+'</div>';
  h+='<button type="button" class="copy-btn" id="copyBtn" data-url="'+trackUrl+'">复制</button>';
  h+='</div>';
  h+='</div>';

  document.getElementById('app').innerHTML=h;
}

function copyLink(url){
  var btn=document.getElementById('copyBtn');
  var input=document.createElement('input');
  input.value=url;
  input.style.position='fixed';
  input.style.top='0';
  input.style.left='-9999px';
  document.body.appendChild(input);
  input.focus();
  input.select();
  try{
    document.execCommand('copy');
    if(btn){btn.textContent='已复制';btn.classList.add('copied');}
    setTimeout(function(){if(btn){btn.textContent='复制';btn.classList.remove('copied');}},2000);
  }catch(e){
    if(btn){btn.textContent='复制失败';}
    setTimeout(function(){if(btn){btn.textContent='复制';}},2000);
  }
  document.body.removeChild(input);
}

function doConfirm(stepIdx){
  if(!confirm('确认完成这道工序？')) return;
  var o=allOrders[currentDetailIdx];
  if(!o) return;
  var btn=document.getElementById('confirmBtn');
  var msgBox=document.getElementById('msgBox');
  if(!btn) return;

  var steps=getStepsForOrder(o);

  btn.disabled=true;
  btn.textContent='处理中...';

  fetch('/api/complete_step',{
    method:'POST',
    body:JSON.stringify({recordId:o.recordId,stepName:steps[stepIdx],stepNum:stepIdx+1}),
    headers:{'Content-Type':'application/json'}
  })
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.success){
      btn.textContent='已完成';
      btn.style.background='#22c55e';
      var now=new Date();
      var timeStr=formatTime(now);
      stepCompletedTimes[currentDetailIdx+'_'+stepIdx]=timeStr;
      var newMsgBox=document.getElementById('msgBox');
      if(newMsgBox){
        newMsgBox.textContent='✓ '+steps[stepIdx]+' 已完成于 '+timeStr;
        newMsgBox.className='msg-box success';
        newMsgBox.style.display='block';
      }
      if(allOrders[currentDetailIdx]){
        allOrders[currentDetailIdx].stepNum=stepIdx+2;
        allOrders[currentDetailIdx].currentStep=steps[stepIdx+1]||'已完工';
      }
      setTimeout(function(){showDetail(currentDetailIdx);},800);
    } else {
      btn.disabled=false;
      btn.textContent='确认完成';
      var newMsgBox=document.getElementById('msgBox');
      if(newMsgBox){newMsgBox.textContent='操作失败：'+(data.message||'请稍后重试');newMsgBox.className='msg-box error';newMsgBox.style.display='block';}
    }
  })
  .catch(function(e){
    btn.disabled=false;
    btn.textContent='确认完成';
    var newMsgBox=document.getElementById('msgBox');
    if(newMsgBox){newMsgBox.textContent='网络开小差，请重试~';newMsgBox.className='msg-box error';newMsgBox.style.display='block';}
  });
}

function init(){
  fetch('/api/orders')
    .then(function(r){return r.json()})
    .then(function(data){
      allOrders=data.orders||[];
      renderList();
    })
    .catch(function(){
      allOrders=[];
      renderList();
    });
}

document.addEventListener('click',function(e){
  var target=e.target;

  if(target.classList&&target.classList.contains('order-card')){
    var idx=parseInt(target.getAttribute('data-idx'));
    if(!isNaN(idx)){
      showDetail(idx);
    }
    return;
  }

  if(target.id==='confirmBtn'){
    var stepIdx=parseInt(target.getAttribute('data-step'));
    if(!isNaN(stepIdx)){
      doConfirm(stepIdx);
    }
    return;
  }

  if(target.id==='copyBtn'){
    var url=target.getAttribute('data-url');
    if(url) copyLink(url);
    return;
  }

  if(target.classList&&target.classList.contains('detail-back')){
    renderList();
    return;
  }
});

init();
</script>
</body>
</html>
