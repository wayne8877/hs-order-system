<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合盛跟单中心</title>
<style>
:root {
  --bg: #f5f0ea;
  --surface: #ffffff;
  --surface-2: #faf8f5;
  --surface-3: #f0ebe4;
  --border: #e8e0d5;
  --border-hover: #d4c9b8;
  --text-primary: #1a1614;
  --text-secondary: #6b5f52;
  --text-tertiary: #a89b8c;
  --accent: #c07d4a;
  --accent-light: #f5e8d8;
  --green: #4a8c5e;
  --green-light: #e8f3eb;
  --red: #c0524a;
  --red-light: #f8e8e7;
  --amber: #c0894a;
  --amber-light: #f8f0e3;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --shadow: 0 2px 12px rgba(26,22,20,0.06);
  --shadow-lg: 0 8px 32px rgba(26,22,20,0.10);
  --font: 'PingFang SC', 'SF Pro Display', -apple-system, sans-serif;
  --transition: 200ms ease;
}
* {margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);height:100vh;display:flex}

/* Layout */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top{padding:28px 20px 20px;border-bottom:1px solid var(--border)}
.sidebar-brand{font-size:18px;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em}
.sidebar-sub{font-size:12px;color:var(--text-tertiary);margin-top:3px}
.nav-section{padding:16px 10px 8px}
.nav-label{font-size:10px;font-weight:600;color:var(--text-tertiary);padding:0 10px 8px;letter-spacing:0.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:14px;transition:all var(--transition);margin-bottom:2px;text-decoration:none}
.nav-item:hover{background:var(--surface-2);color:var(--text-primary)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.nav-icon{width:18px;height:18px;opacity:0.5;flex-shrink:0}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--surface-3);color:var(--text-tertiary);font-size:11px;padding:2px 7px;border-radius:10px;min-width:22px;text-align:center}
.nav-badge.red{background:var(--red-light);color:var(--red)}
.nav-badge.green{background:var(--green-light);color:var(--green)}
.sidebar-bottom{margin-top:auto;padding:16px 10px;border-top:1px solid var(--border)}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm)}
.sidebar-avatar{width:28px;height:28px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-user-name{font-size:14px;color:var(--text-primary)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:600;color:var(--text-primary)}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar-sync{font-size:12px;color:var(--text-tertiary)}
.topbar-time{font-size:24px;font-weight:300;color:var(--text-secondary);letter-spacing:-0.02em}
.topbar-date{font-size:12px;color:var(--text-tertiary);text-align:right;line-height:1.3}

.content{flex:1;overflow-y:auto;padding:28px 32px;display:flex;flex-direction:column;gap:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Page Header */
.page-header{display:flex;justify-content:space-between;align-items:flex-end}
.page-title{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em}
.page-sub{font-size:13px;color:var(--text-tertiary);margin-top:4px}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow);transition:all var(--transition);cursor:pointer}
.stat-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.stat-label{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px}
.stat-value{font-size:36px;font-weight:700;color:var(--text-primary);letter-spacing:-0.04em;line-height:1}
.stat-sub{font-size:12px;color:var(--text-tertiary);margin-top:6px}
.stat-card.accent{background:var(--accent);border-color:var(--accent)}
.stat-card.accent .stat-label{color:rgba(255,255,255,0.7)}
.stat-card.accent .stat-value{color:#fff}
.stat-card.accent .stat-sub{color:rgba(255,255,255,0.7)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.red .stat-label{color:var(--text-tertiary)}

/* Menu Cards */
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.menu-card{display:flex;align-items:center;gap:16px;padding:22px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);cursor:pointer;text-decoration:none;color:var(--text-primary);transition:all var(--transition)}
.menu-card:hover{border-color:var(--border-hover);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.menu-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon svg{width:22px;height:22px}
.menu-icon.dashboard{background:var(--accent-light)}
.menu-icon.dashboard svg{color:var(--accent)}
.menu-icon.new{background:var(--amber-light)}
.menu-icon.new svg{color:var(--amber)}
.menu-icon.order{background:var(--surface-3)}
.menu-icon.order svg{color:var(--text-secondary)}
.menu-icon.customer{background:var(--green-light)}
.menu-icon.customer svg{color:var(--green)}
.menu-icon.inventory{background:var(--accent-light)}
.menu-icon.inventory svg{color:var(--accent)}
.menu-name{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:3px}
.menu-desc{font-size:12px;color:var(--text-tertiary)}

/* Quick Links */
.quick-links{display:flex;flex-direction:column;gap:10px}
.ql-item{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;text-decoration:none;color:var(--text-primary);transition:all var(--transition);box-shadow:var(--shadow)}
.ql-item:hover{border-color:var(--border-hover);box-shadow:var(--shadow-lg)}
.ql-left{display:flex;align-items:center;gap:10px}
.ql-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ql-dot.red{background:var(--red)}
.ql-dot.amber{background:var(--amber)}
.ql-dot.green{background:var(--green)}
.ql-text{font-size:14px;font-weight:500}
.ql-count{font-size:12px;color:var(--text-tertiary);margin-left:6px}
.ql-arrow{color:var(--text-tertiary);font-size:12px}

/* Panels */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:15px;font-weight:600;color:var(--text-primary)}
.panel-meta{font-size:12px;color:var(--text-tertiary)}
.panel-body{padding:16px 20px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

/* Settings */
.settings-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.settings-row{display:flex;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px}
.settings-row:last-child{border-bottom:none}
.settings-key{color:var(--text-secondary)}
.settings-val{color:var(--text-tertiary)}
.settings-val.green{color:var(--green)}

/* Footer */
.footer{text-align:center;padding:16px;font-size:12px;color:var(--text-tertiary);border-top:1px solid var(--border)}

/* Skeleton */
.loading-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-md);height:90px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Responsive */
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.sidebar{width:200px}.content{padding:20px}.menu-grid{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{display:none}.content{padding:16px}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script src="shared.js"></script>
<script>
var FS_APP_TOKEN = 'ZXaCbhbaOaUylfsznlRcICJSnMh';
var FS_APP_ID = 'cli_a94bdf0fc3b89bb7';
var FS_APP_SECRET = 'p8QsSAq2zb8dVazJkE487gXkFVQx3Mr3';
var FS_PROD_TABLE = 'tblulFnP5TbawnY1';
var fsAccessToken = null;
var orders = [];

async function getFeishuToken() {
  if (fsAccessToken) return fsAccessToken;
  try {
    var r = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({app_id:FS_APP_ID, app_secret:FS_APP_SECRET})
    });
    var d = await r.json();
    if (d.tenant_access_token) fsAccessToken = d.tenant_access_token;
  } catch(e) {}
  return fsAccessToken;
}

async function loadStats() {
  try {
    // Try via backend proxy first
    var r = await fetch('/api/prod_orders');
    var d = await r.json();
    if (d.data && d.data.items) {
      processOrders(d.data.items);
      return;
    }
  } catch(e) {
    // Fallback: direct Feishu API
  }
  try {
    var token = await getFeishuToken();
    if (!token) return;
    var r2 = await fetch(
      'https://open.feishu.cn/open-apis/bitable/v1/apps/' + FS_APP_TOKEN + '/tables/' + FS_PROD_TABLE + '/records?page_size=100',
      { headers:{Authorization:'Bearer '+token} }
    );
    var d2 = await r2.json();
    if (d2.data && d2.data.items) {
      processOrders(d2.data.items);
    }
  } catch(e) { console.error(e); }
}

function processOrders(items) {
  var today = new Date().toISOString().split('T')[0];
  var urgent = items.filter(function(o){
    var est = o.fields['预计完成日期'];
    if (!est) return false;
    var days = Math.ceil((new Date(est) - new Date(today)) / 86400000);
    return days >= 0 && days <= 3 && !o.fields['完工入库'];
  }).length;
  var producing = items.filter(function(o){ return !o.fields['完工入库'] && (o.fields['当前工序']||'') !== '接单' }).length;
  var pending = items.filter(function(o){ return !o.fields['完工入库'] && (o.fields['当前工序']||'') === '接单' }).length;
  var done = items.filter(function(o){ return !!o.fields['完工入库'] }).length;
  var todayOrders = items.filter(function(o){
    var est = o.fields['预计完成日期'];
    return est && new Date(est).toISOString().split('T')[0] === today;
  }).length;
  var total = items.length;
  var producingTotal = producing + pending;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statUrgent').textContent = urgent;
  document.getElementById('statProducing').textContent = producingTotal;
  document.getElementById('statProducingSub').textContent = producing > 0 ? '车间进行中' : (pending > 0 ? '待启动' : '');
  document.getElementById('statDone').textContent = done;
  document.getElementById('navUrgent').textContent = urgent;
  document.getElementById('urgentCount').textContent = urgent + '单';
  document.getElementById('todayCount').textContent = todayOrders + '单';
  document.getElementById('invCount').textContent = total + '品';

  updateSyncTime();
}

function pad(n) { return n < 10 ? '0' + n : n; }

function updateSyncTime() {
  var now = new Date();
  var t = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('headerTime').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('headerDate').textContent = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate();
  document.getElementById('syncTime').textContent = '同步 ' + t;
}

setInterval(updateSyncTime, 1000);
updateSyncTime();

loadStats();
setInterval(loadStats, 30000);
</script>
