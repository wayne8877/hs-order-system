<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合盛跟单中心</title>
<style>
:root {
  --bg: #0D0D0D;
  --surface-1: #111111;
  --surface-2: #161616;
  --surface-3: #1C1C1C;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.1);
  --text-primary: #FFFFFF;
  --text-secondary: #8A8A8A;
  --text-tertiary: #525252;
  --accent: #5E6AD2;
  --green: #2DA94E;
  --green-bg: rgba(45,169,78,0.1);
  --red: #F23D3D;
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.1);
  --radius-md: 8px;
  --font: 'Inter','-apple-system','system-ui',sans-serif;
}
* {margin:0;padding:0;box-sizing:border-box}
html,body {height:100%;overflow:hidden}
body {font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text-primary);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

.app {display:flex;height:100vh;overflow:hidden}
.sidebar {width:220px;background:var(--surface-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-top {padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand {font-size:15px;font-weight:700;letter-spacing:-0.01em}
.sidebar-sub {font-size:12px;color:var(--text-tertiary);margin-top:3px}

.nav-section {padding:12px 8px 4px}
.nav-label {font-size:11px;font-weight:500;color:var(--text-tertiary);padding:4px 8px 6px;letter-spacing:0.04em;text-transform:uppercase}
.nav-item {display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all 150ms ease;text-decoration:none;margin-bottom:1px}
.nav-item:hover {background:var(--surface-2);color:var(--text-primary)}
.nav-item.active {background:var(--surface-3);color:var(--text-primary)}
.nav-icon {width:16px;height:16px;opacity:0.6;flex-shrink:0}
.nav-item.active .nav-icon {opacity:1}

.sidebar-bottom {margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.sidebar-user {display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px}
.sidebar-avatar {width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.sidebar-user-name {font-size:13px;color:var(--text-primary)}

.main {flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar {height:48px;background:var(--surface-1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.topbar-title {font-size:14px;font-weight:600}
.topbar-time {font-size:18px;font-weight:300;color:var(--text-primary);letter-spacing:-0.02em;font-family:'Helvetica Neue',Arial,sans-serif}

.content {flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.content::-webkit-scrollbar {width:4px}
.content::-webkit-scrollbar-thumb {background:var(--surface-3);border-radius:2px}

.page-title {font-size:18px;font-weight:600;margin-bottom:4px}
.page-sub {font-size:13px;color:var(--text-tertiary);margin-bottom:16px}

.card {background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px}

.section-title {font-size:13px;font-weight:600;margin-bottom:14px}

.menu-grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.menu-card {
  display:flex;align-items:center;gap:12px;
  padding:16px 18px;border-radius:8px;
  background:var(--surface-2);border:1px solid var(--border);
  cursor:pointer;text-decoration:none;color:var(--text-primary);
  transition:all 150ms ease;
}
.menu-card:hover {border-color:var(--border-hover);background:var(--surface-3)}
.menu-icon {width:36px;height:36px;background:var(--surface-3);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-icon svg {width:18px;height:18px;opacity:0.7}
.menu-name {font-size:14px;font-weight:600;margin-bottom:2px}
.menu-desc {font-size:12px;color:var(--text-tertiary)}

.stats-row {display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px}
.stat-card {background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;text-align:center}
.stat-value {font-size:26px;font-weight:600;letter-spacing:-0.03em;color:var(--text-primary)}
.stat-label {font-size:11px;color:var(--text-tertiary);margin-top:4px;text-transform:uppercase;letter-spacing:0.04em}

.divider {height:1px;background:var(--border);margin:4px 0}

.quick-links {display:flex;flex-direction:column;gap:6px}
.ql-item {
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-radius:6px;
  background:var(--surface-2);border:1px solid var(--border);
  cursor:pointer;text-decoration:none;color:var(--text-primary);
  font-size:13px;transition:all 150ms ease;
}
.ql-item:hover {border-color:var(--border-hover);background:var(--surface-3)}
.ql-item-left {display:flex;align-items:center;gap:8px}
.ql-dot {width:6px;height:6px;border-radius:50%;background:var(--accent)}
.ql-arrow {color:var(--text-tertiary);font-size:12px}

.footer {text-align:center;padding:16px;font-size:12px;color:var(--text-tertiary);border-top:1px solid var(--border)}

@media(max-width:900px) {
  .sidebar {width:180px}
  .menu-grid {grid-template-columns:1fr}
  .stats-row {grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px) {
  .sidebar {display:none}
  .content {padding:16px}
  .stats-row {grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="app">

  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">合盛跟单</div>
      <div class="sidebar-sub">Hesheng Orders</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">主站</div>
      <a class="nav-item active" href="/dashboard">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
        仪表盘
      </a>
      <a class="nav-item" href="/app">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        新增订单
      </a>
      <a class="nav-item" href="/order-pro-a">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 8h6M5 5h2M5 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        订单管理
      </a>
      <a class="nav-item" href="/customer-track">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 13c0-2.2 2.7-4 6-4s6 1.8 6 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        客户查询
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-label">库存</div>
      <a class="nav-item" href="/dashboard" onclick="switchInventory()">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 4V3a1 1 0 012 0v1M9 4V3a1 1 0 012 0v1" stroke="currentColor" stroke-width="1.2"/></svg>
        成品库存
      </a>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="sidebar-avatar">W</div>
        <div class="sidebar-user-name">Wayne</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">合盛钮扣厂 - 跟单管理系统</div>
      <div class="topbar-time" id="headerTime">--:--</div>
    </div>

    <div class="content">
      <div>
        <div class="page-title">欢迎回来</div>
        <div class="page-sub">合盛钮扣跟单中心 · 实时数据</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">-</div>
          <div class="stat-label">全部订单</div>
        </div>
        <div class="stat-card" style="border-color:rgba(242,61,61,0.2)">
          <div class="stat-value" id="statUrgent" style="color:var(--red)">-</div>
          <div class="stat-label">紧急</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statProducing">-</div>
          <div class="stat-label">生产中</div>
        </div>
        <div class="stat-card" style="border-color:rgba(45,169,78,0.2)">
          <div class="stat-value" id="statDone" style="color:var(--green)">-</div>
          <div class="stat-label">已完成</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">快捷入口</div>
        <div class="menu-grid">
          <a class="menu-card" href="/dashboard">
            <div class="menu-icon">
              <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/></svg>
            </div>
            <div>
              <div class="menu-name">仪表盘</div>
              <div class="menu-desc">查看全部订单状态</div>
            </div>
          </a>
          <a class="menu-card" href="/app">
            <div class="menu-icon" style="background:var(--accent);opacity:0.9)">
              <svg viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
            <div>
              <div class="menu-name">新增订单</div>
              <div class="menu-desc">一单支持多款产品</div>
            </div>
          </a>
          <a class="menu-card" href="/order-pro-a">
            <div class="menu-icon">
              <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 8h6M5 5h2M5 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </div>
            <div>
              <div class="menu-name">订单管理</div>
              <div class="menu-desc">管理所有生产订单</div>
            </div>
          </a>
          <a class="menu-card" href="/customer-track">
            <div class="menu-icon">
              <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="6" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2 13c0-2.2 2.7-4 6-4s6 1.8 6 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </div>
            <div>
              <div class="menu-name">客户查询</div>
              <div class="menu-desc">按客户查看订单</div>
            </div>
          </a>
        </div>
      </div>

      <div class="card">
        <div class="section-title">快速链接</div>
        <div class="quick-links">
          <a class="ql-item" href="/dashboard">
            <div class="ql-item-left"><div class="ql-dot" style="background:var(--red)"></div>紧急订单 <span id="urgentCount" style="color:var(--text-tertiary);margin-left:6px;font-size:12px">-</span></div>
            <div class="ql-arrow">→</div>
          </a>
          <a class="ql-item" href="/dashboard">
            <div class="ql-item-left"><div class="ql-dot" style="background:var(--amber)"></div>今日交货 <span id="todayCount" style="color:var(--text-tertiary);margin-left:6px;font-size:12px">-</span></div>
            <div class="ql-arrow">→</div>
          </a>
          <a class="ql-item" href="/dashboard" onclick="event.preventDefault();document.getElementById('nav-inv').click()">
            <div class="ql-item-left"><div class="ql-dot" style="background:var(--green)"></div>库存预警 <span id="invCount" style="color:var(--text-tertiary);margin-left:6px;font-size:12px">-</span></div>
            <div class="ql-arrow">→</div>
          </a>
        </div>
      </div>

      <div class="footer">
        合盛钮扣跟单系统 v4.0 · Linear Style · 飞书数据已同步
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
var FS_APP_TOKEN = 'ZXaCbhbaOaUylfsznlRcICJSnMh';
var FS_APP_ID = 'cli_a94bdf0fc3b89bb7';
var FS_APP_SECRET = 'p8QsSAq2zb8dVazJkE487gXkFVQx3Mr3';
var FS_PROD_TABLE = 'tblulFnP5TbawnY1';
var fsAccessToken = null;

async function getFeishuToken() {
  if (fsAccessToken) return fsAccessToken;
  try {
    var r = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({app_id:FS_APP_ID, app_secret:FS_APP_SECRET})
    });
    var d = await r.json();
    if (d.tenant_access_token) fsAccessToken = d.tenant_access_token;
  } catch(e) {}
  return fsAccessToken;
}

async function loadStats() {
  var token = await getFeishuToken();
  if (!token) return;
  try {
    var r = await fetch(
      'https://open.feishu.cn/open-apis/bitable/v1/apps/' + FS_APP_TOKEN + '/tables/' + FS_PROD_TABLE + '/records?page_size=100',
      { headers:{Authorization:'Bearer '+token} }
    );
    var d = await r.json();
    if (d.data && d.data.items) {
      var orders = d.data.items;
      var today = new Date().toISOString().split('T')[0];
      var urgent = orders.filter(function(o){ 
        var est = o.fields['预计完成日期'];
        if (!est) return false;
        var days = Math.ceil((new Date(est) - new Date(today)) / 86400000);
        return days >= 0 && days <= 3 && !o.fields['完工入库'];
      }).length;
      var producing = orders.filter(function(o){ return !o.fields['完工入库'] && (o.fields['当前工序']||'') !== '接单' }).length;
      var done = orders.filter(function(o){ return !!o.fields['完工入库'] }).length;
      var todayOrders = orders.filter(function(o){
        var est = o.fields['预计完成日期'];
        return est && new Date(est).toISOString().split('T')[0] === today;
      }).length;
      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statUrgent').textContent = urgent;
      document.getElementById('statProducing').textContent = producing;
      document.getElementById('statDone').textContent = done;
      document.getElementById('urgentCount').textContent = urgent + '单';
      document.getElementById('todayCount').textContent = todayOrders + '单';
    }
  } catch(e) { console.error(e); }
}

function pad(n) { return n < 10 ? '0' + n : n; }
function updateTime() {
  var now = new Date();
  document.getElementById('headerTime').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
}
setInterval(updateTime, 1000);
updateTime();

loadStats();
setInterval(loadStats, 30000);
</script>
</body>
</html>
