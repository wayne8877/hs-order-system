<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>订单查询 - 合盛钮扣厂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:15px;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:40px 20px}

/*Logo区*/
.logo{text-align:center;margin-bottom:40px}
.logo h1{font-size:28px;font-weight:700;color:#1d1d1f;margin-bottom:4px}
.logo p{font-size:14px;color:#86868b}

/*查询框*/
.query-card{background:#fff;border-radius:20px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.query-card h2{font-size:17px;font-weight:600;margin-bottom:20px;text-align:center}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;color:#86868b;margin-bottom:8px}
.input-group input{width:100%;padding:14px 16px;border:1px solid #d2d2d7;border-radius:12px;font-size:16px;outline:none;transition:border-color .2s}
.input-group input:focus{border-color:#007aff}
.query-btn{width:100%;background:#007aff;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
.query-btn:active{transform:scale(0.98)}

/*提示*/
.hint{text-align:center;color:#86868b;font-size:13px;margin-top:20px;line-height:1.6}
.hint strong{color:#1d1d1f}
</style>
</head>
<body>

<div class="wrap">
<div class="logo">
<h1>合盛钮扣厂</h1>
<p>订单进度查询</p>
</div>

<div class="query-card">
<h2>请输入订单号</h2>
<div class="input-group">
<label>订单号</label>
<input type="text" id="orderInput" placeholder="例：ORD20260407001" autofocus>
</div>
<button class="query-btn" onclick="queryOrder()">查询订单</button>
</div>

<div class="hint">
订单号由跟单员提供<br>
或扫描订单上的二维码
</div>
</div>

<script>
function queryOrder(){
  var orderId=document.getElementById('orderInput').value.trim();
  if(!orderId){
    alert('请输入订单号');
    return;
  }
  window.location.href='/track/'+encodeURIComponent(orderId);
}

// 回车查询
document.getElementById('orderInput').onkeypress=function(e){
  if(e.key==='Enter') queryOrder();
};
</script>

</body>
</html>
