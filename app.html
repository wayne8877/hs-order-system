<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>合盛 - 新增订单</title>
<style>
:root {
  --bg: #f5f6f8;
  --card: #fff;
  --border: #e5e7eb;
  --text: #111827;
  --text-sub: #6b7280;
  --text-muted: #9ca3af;
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --green: #22c55e;
  --amber: #f59e0b;
  --radius: 12px;
}
* {margin:0;padding:0;box-sizing:border-box}
html,body {height:100%;overflow:hidden}
body {font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.main {flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.main::-webkit-scrollbar {width:3px}
.main::-webkit-scrollbar-thumb {background:var(--border);border-radius:2px}

/* Header */
.header {
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-back {font-size:22px;color:var(--text-sub);cursor:pointer;padding:4px}
.header-title {font-size:16px;font-weight:600}
.header-save {
  background:var(--blue);color:#fff;border:none;border-radius:8px;
  padding:8px 18px;font-size:14px;cursor:pointer;font-weight:500;
}
.header-save:disabled {background:var(--text-muted);cursor:not-allowed}

/* Section */
.section {background:var(--card);border-radius:var(--radius);padding:14px 16px}
.section-title {font-size:13px;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.section-title span {font-size:12px;color:var(--blue);float:right;text-transform:none;letter-spacing:0}

/* Customer Select */
.customer-select {
  width:100%;padding:12px 14px;
  border:1px solid var(--border);border-radius:10px;
  font-size:15px;color:var(--text);background:#fff;
  cursor:pointer;appearance:none;
}
.customer-select:focus {outline:none;border-color:var(--blue)}

/* Product Rows */
.product-list {display:flex;flex-direction:column;gap:10px}
.product-row {
  background:#f9fafb;border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;position:relative;
}
.product-row-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.product-num {font-size:13px;font-weight:600;color:var(--text)}
.product-remove {font-size:13px;color:var(--red);cursor:pointer;padding:2px 8px}
.product-fields {display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field-group {display:flex;flex-direction:column;gap:4px}
.field-label {font-size:12px;color:var(--text-muted)}
.field-input {
  width:100%;padding:10px 12px;
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);background:#fff;
}
.field-input:focus {outline:none;border-color:var(--blue)}
.field-select {
  width:100%;padding:10px 12px;
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;color:var(--text);background:#fff;cursor:pointer;
}

/* Add Product */
.add-product {
  width:100%;padding:12px;
  border:1px dashed var(--border);border-radius:10px;
  background:none;color:var(--blue);font-size:14px;cursor:pointer;
}
.add-product:hover {background:var(--blue-bg)}

/* Note */
.note-input {
  width:100%;padding:12px 14px;
  border:1px solid var(--border);border-radius:10px;
  font-size:14px;color:var(--text);background:#fff;resize:none;rows:3;
}

/* Success/Error Toast */
.toast {
  position:fixed;top:70px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;
  z-index:1000;opacity:0;transition:opacity .3s;
}
.toast.show {opacity:1}
.toast.success {background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast.error {background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

/* Bottom Nav */
.nav {
  display:flex;flex-shrink:0;
  background:var(--card);
  border-top:1px solid var(--border);
}
.nav-item {
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:10px 0;
  cursor:pointer;border:none;background:none;color:var(--text-muted);
  font-size:11px;gap:3px;
}
.nav-item.active,.nav-item:hover {color:var(--blue)}
.nav-icon {font-size:20px}

/* Loading */
.loading {text-align:center;padding:40px;color:var(--text-muted)}

/* Empty product hint */
.empty-products {text-align:center;padding:20px;color:var(--text-muted);font-size:14px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-back" onclick="goBack()">&lt;</div>
  <div class="header-title">新增订单</div>
  <button class="header-save" id="saveBtn" onclick="submitOrder()">保存</button>
</div>

<!-- Main -->
<div class="main">

  <!-- 客户 -->
  <div class="section">
    <div class="section-title">客户信息</div>
    <select class="customer-select" id="customerSelect">
      <option value="">-- 选择客户 --</option>
    </select>
  </div>

  <!-- 产品明细 -->
  <div class="section">
    <div class="section-title">产品明细 <span id="productCount">0款</span></div>
    <div class="product-list" id="productList">
      <div class="empty-products">点击下方按钮添加产品</div>
    </div>
    <button class="add-product" onclick="addProduct()">+ 再加一款产品</button>
  </div>

  <!-- 备注 -->
  <div class="section">
    <div class="section-title">备注（选填）</div>
    <textarea class="note-input" id="noteInput" rows="3" placeholder="客诉备注、特殊要求等..."></textarea>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 配置
// ============================================================
var FS_APP_TOKEN = 'ZXaCbhbaOaUylfsznlRcICJSnMh';
var FS_APP_ID    = 'cli_a94bdf0fc3b89bb7';
var FS_APP_SECRET= 'p8QsSAq2zb8dVazJkE487gXkFVQx3Mr3';
var FS_CUST_TABLE = 'tblMqxTf98wrJRo3';   // 客户信息
var FS_PROD_TABLE = 'tblabu9EcSNhQWzg';    // 产品信息
var FS_ORDER_TABLE = 'tbl5h2tvRGJ86POP';   // 订单管理
var fsAccessToken = null;

// ============================================================
// 数据
// ============================================================
var customers = [];   // [{id, name}]
var products = [];   // [{id, code, name, unit}]
var productRows = []; // [{prodId, qty, date}]
var productCounter = 0;

// ============================================================
// 初始化
// ============================================================
async function init() {
  await Promise.all([loadCustomers(), loadProducts()]);
  addProduct(); // 默认加一行
}

async function getFeishuToken() {
  if (fsAccessToken) return fsAccessToken;
  try {
    var r = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({app_id: FS_APP_ID, app_secret: FS_APP_SECRET})
    });
    var d = await r.json();
    if (d.tenant_access_token) fsAccessToken = d.tenant_access_token;
  } catch(e) {}
  return fsAccessToken;
}

async function loadCustomers() {
  var token = await getFeishuToken();
  if (!token) return;
  try {
    var r = await fetch(
      'https://open.feishu.cn/open-apis/bitable/v1/apps/' + FS_APP_TOKEN + '/tables/' + FS_CUST_TABLE + '/records?page_size=100',
      { headers: {Authorization: 'Bearer ' + token} }
    );
    var d = await r.json();
    if (d.data && d.data.items) {
      customers = d.data.items.map(function(item) {
        return {
          id: item.record_id,
          name: item.fields['客户名称'] || '-'
        };
      }).filter(function(c){ return c.name && c.name !== '-'; });
      renderCustomerSelect();
    }
  } catch(e) { console.error('loadCustomers失败', e); }
}

async function loadProducts() {
  var token = await getFeishuToken();
  if (!token) return;
  try {
    var r = await fetch(
      'https://open.feishu.cn/open-apis/bitable/v1/apps/' + FS_APP_TOKEN + '/tables/' + FS_PROD_TABLE + '/records?page_size=100',
      { headers: {Authorization: 'Bearer ' + token} }
    );
    var d = await r.json();
    if (d.data && d.data.items) {
      products = d.data.items.map(function(item) {
        return {
          id: item.record_id,
          code: item.fields['产品编号'] || '',
          name: item.fields['名称'] || '-',
          unit: item.fields['计量单位'] || '件'
        };
      }).filter(function(p){ return p.name !== '-'; });
    }
  } catch(e) { console.error('loadProducts失败', e); }
}

function renderCustomerSelect() {
  var sel = document.getElementById('customerSelect');
  sel.innerHTML = '<option value="">-- 选择客户 --</option>';
  customers.forEach(function(c) {
    sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
  });
}

// ============================================================
// 产品行
// ============================================================
function addProduct() {
  productCounter++;
  var row = {
    id: productCounter,
    prodId: '',
    qty: '',
    date: getDefaultDate()
  };
  productRows.push(row);
  renderProductList();
  updateSaveBtn();
}

function removeProduct(id) {
  productRows = productRows.filter(function(r){ return r.id !== id; });
  renderProductList();
  updateSaveBtn();
  updateProductCount();
}

function renderProductList() {
  var container = document.getElementById('productList');
  if (productRows.length === 0) {
    container.innerHTML = '<div class="empty-products">点击下方按钮添加产品</div>';
    return;
  }
  var html = '';
  productRows.forEach(function(row) {
    html += '<div class="product-row" id="row_' + row.id + '">';
    html += '<div class="product-row-header">';
    html += '<div class="product-num">产品 ' + row.id + '</div>';
    if (productRows.length > 1) {
      html += '<div class="product-remove" onclick="removeProduct(' + row.id + ')">删除</div>';
    }
    html += '</div>';
    html += '<div class="product-fields">';
    html += '<div class="field-group">';
    html += '<div class="field-label">产品</div>';
    html += '<select class="field-select" id="prod_' + row.id + '" onchange="updateRow(' + row.id + ',\'prodId\',this.value)">';
    html += '<option value="">-- 选择产品 --</option>';
    products.forEach(function(p) {
      html += '<option value="' + p.id + '">' + escapeHtml(p.code) + ' - ' + escapeHtml(p.name) + '</option>';
    });
    html += '</select>';
    html += '</div>';
    html += '<div class="field-group">';
    html += '<div class="field-label">数量</div>';
    html += '<input type="number" class="field-input" id="qty_' + row.id + '" placeholder="数量" value="' + row.qty + '" oninput="updateRow(' + row.id + ',\'qty\',this.value)">';
    html += '</div>';
    html += '<div class="field-group" style="grid-column:1/-1">';
    html += '<div class="field-label">交货日期</div>';
    html += '<input type="date" class="field-input" id="date_' + row.id + '" value="' + row.date + '" oninput="updateRow(' + row.id + ',\'date\',this.value)">';
    html += '</div>';
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
  // 恢复选中状态
  productRows.forEach(function(row) {
    var prodSel = document.getElementById('prod_' + row.id);
    var qtyInput = document.getElementById('qty_' + row.id);
    var dateInput = document.getElementById('date_' + row.id);
    if (prodSel && row.prodId) prodSel.value = row.prodId;
    if (qtyInput && row.qty) qtyInput.value = row.qty;
    if (dateInput && row.date) dateInput.value = row.date;
  });
  updateProductCount();
}

function updateRow(id, field, value) {
  var row = productRows.find(function(r){ return r.id === id; });
  if (!row) return;
  if (field === 'prodId') row.prodId = value;
  else if (field === 'qty') row.qty = value;
  else if (field === 'date') row.date = value;
  updateSaveBtn();
}

function updateProductCount() {
  document.getElementById('productCount').textContent = productRows.length + '款';
}

function updateSaveBtn() {
  var btn = document.getElementById('saveBtn');
  var customerId = document.getElementById('customerSelect').value;
  var hasProduct = productRows.some(function(r){ return r.prodId && r.qty && r.date; });
  btn.disabled = !(customerId && hasProduct);
}

function getDefaultDate() {
  var d = new Date();
  d.setDate(d.getDate() + 7);
  return d.toISOString().split('T')[0];
}

// ============================================================
// 提交
// ============================================================
async function submitOrder() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  var customerId = document.getElementById('customerSelect').value;
  var note = document.getElementById('noteInput').value.trim();

  var validRows = productRows.filter(function(r){ return r.prodId && r.qty && r.date; });

  if (validRows.length === 0) {
    showToast('请至少添加一款产品', 'error');
    btn.disabled = false;
    btn.textContent = '保存';
    return;
  }

  var token = await getFeishuToken();
  if (!token) {
    showToast('飞书连接失败', 'error');
    btn.disabled = false;
    btn.textContent = '保存';
    return;
  }

  // 按交货日期分组，每款产品创建一条订单
  var created = 0;
  for (var i = 0; i < validRows.length; i++) {
    var row = validRows[i];
    var product = products.find(function(p){ return p.id === row.prodId; });
    var fields = {
      '客户编号': {link: [{type: 'bitable', table_id: FS_CUST_TABLE, record_id: customerId}]},
      '数量': parseInt(row.qty) || 0,
      '要求交货时间': new Date(row.date).getTime(),
      '签约日期': Date.now()
    };
    try {
      var r = await fetch(
        'https://open.feishu.cn/open-apis/bitable/v1/apps/' + FS_APP_TOKEN + '/tables/' + FS_ORDER_TABLE + '/records',
        {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({fields: fields})
        }
      );
      var d = await r.json();
      if (d.code === 0) created++;
    } catch(e) { console.error('创建订单失败', e); }
  }

  btn.disabled = false;
  btn.textContent = '保存';

  if (created > 0) {
    showToast('订单创建成功！' + created + '款产品已录入', 'success');
    // 重置表单
    document.getElementById('customerSelect').value = '';
    document.getElementById('noteInput').value = '';
    productRows = [];
    productCounter = 0;
    renderProductList();
    addProduct();
    updateSaveBtn();
  } else {
    showToast('创建失败，请重试', 'error');
  }
}

// ============================================================
// 工具
// ============================================================
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(function(){ toast.classList.remove('show'); }, 3000);
}

function goBack() {
  window.location.href = '/dashboard';
}

// 监听客户选择变化
document.getElementById('customerSelect').addEventListener('change', updateSaveBtn);

// 初始化
init();
</script>
</body>
</html>
